databases:
  - name: family-manager-postgres
    plan: starter
    postgresMajorVersion: "16"

services:
  - type: web
    name: family-manager-api
    runtime: node
    rootDir: .
    plan: starter
    buildCommand: npm ci ; npm run build --workspace @family-manager/shared ; npm run build --workspace @family-manager/api
    startCommand: npx prisma migrate deploy --schema prisma/schema/schema.prisma ; npm run start --workspace @family-manager/api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: family-manager-postgres
          property: connectionString
      - key: AUTH_JWT_SECRET
        sync: false
      - key: AUTH_JWT_EXPIRES_IN
        value: 15m
      - key: WEB_ORIGIN
        value: https://family-manager-web.onrender.com

  - type: static
    name: family-manager-web
    rootDir: .
    buildCommand: npm ci ; npm run build --workspace @family-manager/shared ; npm run build --workspace @family-manager/web
    staticPublishPath: apps/web/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://family-manager-api.onrender.com/api/v1
